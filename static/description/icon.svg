<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#27ae60"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="28" fill="url(#bg)"/>

  <!-- Gantt bars — 3 tasks with staggered start/end -->
  <!-- Task 1 (critical path, full width) -->
  <rect x="30" y="55" width="140" height="22" rx="4" fill="white" fill-opacity="0.95"/>

  <!-- Task 2 (starts at 30%, ~mid) -->
  <rect x="70" y="90" width="80" height="22" rx="4" fill="white" fill-opacity="0.80"/>

  <!-- Task 3 (starts at 55%) -->
  <rect x="100" y="125" width="70" height="22" rx="4" fill="white" fill-opacity="0.80"/>

  <!-- Milestone diamond at end of task 1 -->
  <polygon points="168,65  178,66  168,77  158,66" fill="white" fill-opacity="0.95"/>

  <!-- Left timeline axis -->
  <line x1="28" y1="48" x2="28" y2="162" stroke="white" stroke-width="2" stroke-opacity="0.5"/>
  <!-- Tick marks -->
  <line x1="28" y1="66"  x2="22" y2="66"  stroke="white" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="28" y1="101" x2="22" y2="101" stroke="white" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="28" y1="136" x2="22" y2="136" stroke="white" stroke-width="1.5" stroke-opacity="0.5"/>
</svg>
